<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#1B1340"/>
<title>Магічна Абетка від А до Я! 🌟</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg-deep:#1B1340;--bg-mid:#3A2272;--bg-hi:#5B2E8C;
  --paper:#FFF8EC;--paper-e:#F4DFB8;--paper-2:#FFF0D8;
  --ink:#2B1B4E;--ink-s:#7B6BA5;--ink-xs:rgba(43,27,78,.18);
  --gold:#FFD23F;--gold-d:#E8A500;
  --white:#fff;
  --l1:#FF7FA8;--l1d:#D93F72;--l1w:#FFE8F0;--l1h:#FF4E8A;
  --l2:#FF9F45;--l2d:#D97020;--l2w:#FFF0DE;--l2h:#FF7A0D;
  --l3:#3DC8F5;--l3d:#0A9FD4;--l3w:#DFFAFF;--l3h:#00B3E8;
  --l4:#5EE09A;--l4d:#1BB870;--l4w:#E0FFF1;--l4h:#00C46A;
  --sh:rgba(27,19,64,.42);
  --fd:'Fredoka','Poppins','Comic Sans MS',system-ui,sans-serif;
  --fb:'Quicksand','Poppins',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--fb);color:var(--ink);
  background:var(--bg-deep);overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  min-height:100svh;
}
button{font-family:inherit;cursor:pointer;touch-action:manipulation;}
::selection{background:var(--gold);color:var(--ink);}

/* ── COSMIC BG ── */
.cosmic{position:fixed;inset:0;z-index:0;overflow:hidden;
  background:linear-gradient(155deg,var(--bg-deep) 0%,var(--bg-mid) 55%,var(--bg-hi) 100%);}
.blob{position:absolute;width:50vmax;height:50vmax;border-radius:50%;
  filter:blur(72px);opacity:.09;animation:drift 24s ease-in-out infinite;}
.blob[data-l="1"]{background:var(--l1);top:-16%;left:-14%;animation-duration:23s;}
.blob[data-l="2"]{background:var(--l2);top:6%;right:-20%;animation-duration:28s;animation-delay:-7s;}
.blob[data-l="3"]{background:var(--l3);bottom:-22%;left:2%;animation-duration:31s;animation-delay:-13s;}
.blob[data-l="4"]{background:var(--l4);bottom:-14%;right:-6%;animation-duration:26s;animation-delay:-4s;}
.blob.lit{opacity:.28;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(4%,7%) scale(1.09);}}
.stars{position:absolute;inset:0;}
.star{position:absolute;border-radius:50%;background:var(--white);animation:twinkle 4s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.12;transform:scale(.65);}50%{opacity:1;transform:scale(1.2);}}
.float-emoji{position:fixed;pointer-events:none;z-index:0;animation:floatUp linear forwards;opacity:0;}
@keyframes floatUp{0%{transform:translateY(0) rotate(-5deg);opacity:0;}
 8%{opacity:.18;}88%{opacity:.18;}100%{transform:translateY(-110vh) rotate(15deg);opacity:0;}}

/* ── SHELL ── */
.shell{position:relative;z-index:1;max-width:1120px;margin:0 auto;
  padding:clamp(16px,3.8vw,38px) clamp(14px,3.8vw,30px) clamp(60px,9vw,90px);}

/* ── HEADER ── */
.hdr{text-align:center;display:flex;flex-direction:column;align-items:center;
  gap:13px;margin-bottom:clamp(20px,3.5vw,34px);}
.hdr-title-row{display:flex;align-items:center;justify-content:center;gap:.4em;flex-wrap:wrap;}
.wand{font-size:clamp(1.7rem,5vw,2.5rem);display:inline-block;
  animation:wand 3s ease-in-out infinite;}
@keyframes wand{0%,100%{transform:rotate(-11deg);}50%{transform:rotate(13deg);}}
.hdr-title{font-family:var(--fd);font-weight:700;
  font-size:clamp(1.55rem,5.4vw,3rem);color:var(--white);line-height:1.2;
  text-shadow:0 3px 0 var(--sh),0 8px 26px rgba(0,0,0,.35);}
.hdr-bubble{background:var(--paper);border-radius:22px;padding:11px 22px;
  font-size:clamp(.93rem,2.5vw,1.13rem);font-weight:600;
  box-shadow:0 6px 0 var(--paper-e),0 10px 22px var(--sh);max-width:570px;color:var(--ink);}
.overall{display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.14);color:var(--white);
  border:2px solid rgba(255,255,255,.28);padding:7px 18px;
  border-radius:999px;font-weight:700;font-size:clamp(.83rem,2.1vw,1rem);}

/* ── LEVEL TABS ── */
.tabs{display:flex;justify-content:center;flex-wrap:wrap;
  gap:clamp(8px,2vw,13px);margin-bottom:clamp(16px,2.8vw,26px);}
.tab{
  --ta:var(--l1);--tad:var(--l1d);
  background:rgba(255,255,255,.13);border:3px solid var(--ta);
  border-radius:20px;color:var(--white);padding:9px 16px;min-width:118px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  box-shadow:0 5px 0 rgba(0,0,0,.24);font-weight:700;
  transition:transform .15s,box-shadow .15s,background .28s,color .28s,border-color .28s;
}
.tab[data-l="1"]{--ta:var(--l1);--tad:var(--l1d);}
.tab[data-l="2"]{--ta:var(--l2);--tad:var(--l2d);}
.tab[data-l="3"]{--ta:var(--l3);--tad:var(--l3d);}
.tab[data-l="4"]{--ta:var(--l4);--tad:var(--l4d);}
.tab-ico{font-size:1.45rem;line-height:1;}
.tab-name{font-size:.93rem;}
.tab-range{font-size:.73rem;opacity:.86;font-weight:600;}
.tab-status{font-size:.71rem;margin-top:2px;background:rgba(0,0,0,.22);
  padding:2px 9px;border-radius:10px;}
.tab:active{transform:translateY(3px);}
.tab.on{background:var(--ta);color:var(--ink);border-color:var(--white);
  box-shadow:0 5px 0 var(--tad),0 10px 20px var(--sh);transform:translateY(-2px);}
.tab.on .tab-status{background:rgba(255,255,255,.55);}
.tab.done .tab-status{background:var(--gold);color:var(--ink);}
.tab:focus-visible{outline:3px solid var(--white);outline-offset:3px;}

/* ── STAGE ── */
.stage{
  --sa:var(--l1);--sad:var(--l1d);--sw:var(--l1w);
  background:var(--sw);border:4px solid var(--sa);border-radius:34px;
  padding:clamp(16px,3.2vw,32px) clamp(12px,2.8vw,26px);
  box-shadow:0 10px 0 var(--sad),0 18px 38px var(--sh);
  transition:background .5s,border-color .5s,box-shadow .5s;
}
.stage[data-l="1"]{--sa:var(--l1);--sad:var(--l1d);--sw:var(--l1w);}
.stage[data-l="2"]{--sa:var(--l2);--sad:var(--l2d);--sw:var(--l2w);}
.stage[data-l="3"]{--sa:var(--l3);--sad:var(--l3d);--sw:var(--l3w);}
.stage[data-l="4"]{--sa:var(--l4);--sad:var(--l4d);--sw:var(--l4w);}

/* ── PROGRESS STARS ── */
.pstars{display:flex;justify-content:center;flex-wrap:wrap;
  gap:5px;margin-bottom:clamp(14px,2.8vw,24px);}
.pstar{font-size:clamp(1.25rem,4vw,1.6rem);color:rgba(43,27,78,.22);
  transition:color .3s;line-height:1;}
.pstar.lit{color:var(--gold);text-shadow:0 0 8px rgba(230,160,0,.6);}
.pstar.pop{animation:spop .48s ease;}
@keyframes spop{0%{transform:scale(1);}42%{transform:scale(1.85) rotate(14deg);}100%{transform:scale(1);}}

/* ── CARD GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:clamp(10px,2.3vw,18px);}
@media(min-width:580px){.grid{grid-template-columns:repeat(auto-fill,minmax(142px,1fr));}}
@media(min-width:960px){.grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));}}

/* ── LETTER CARD ── */
.card{
  --ca:var(--l1);--cad:var(--l1d);
  position:relative;aspect-ratio:.84/1;
  background:none;border:none;padding:0;
  transition:transform .17s ease;
}
.card[data-l="1"]{--ca:var(--l1);--cad:var(--l1d);}
.card[data-l="2"]{--ca:var(--l2);--cad:var(--l2d);}
.card[data-l="3"]{--ca:var(--l3);--cad:var(--l3d);}
.card[data-l="4"]{--ca:var(--l4);--cad:var(--l4d);}
.card:active{transform:scale(.93);}
.card:focus-visible{outline:3px solid var(--ink);outline-offset:4px;}

.card-body{
  width:100%;height:100%;border-radius:22px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:10px 6px;
  background:radial-gradient(circle at 50% 28%,var(--white) 0%,var(--paper) 54%,var(--paper-e) 100%);
  border:4px solid var(--ca);
  box-shadow:0 6px 0 var(--cad),0 10px 20px var(--sh);
  transition:border-color .35s,box-shadow .35s,background .35s;
  overflow:hidden;position:relative;
}
.card-ring{position:absolute;width:62%;aspect-ratio:1;border-radius:50%;
  border:2.5px dashed var(--ca);opacity:.35;
  animation:ring-spin 15s linear infinite;}
@keyframes ring-spin{to{transform:rotate(360deg);}}
.card-big{font-family:var(--fd);font-weight:700;
  font-size:clamp(2.1rem,7vw,3.1rem);color:var(--ink);
  line-height:1;animation:lf 4.2s ease-in-out infinite;position:relative;z-index:1;}
@keyframes lf{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.card-sm{font-family:var(--fd);font-weight:400;
  font-size:clamp(.95rem,3vw,1.35rem);color:var(--ink-s);
  position:relative;z-index:1;}
.card-hint{font-size:clamp(.58rem,1.7vw,.74rem);color:var(--ink-s);font-weight:700;}

/* discovered state */
.card-body.disc{
  background:linear-gradient(148deg,rgba(255,255,255,.78) 0%,var(--paper-2) 100%);
  border-color:var(--gold);
  box-shadow:0 6px 0 var(--gold-d),0 10px 20px var(--sh),0 0 0 3px rgba(255,210,63,.45);
}
.card-body.disc .card-ring{border-color:var(--gold);}
.card-disc-emoji{font-size:clamp(2rem,7.5vw,3rem);line-height:1;
  position:relative;z-index:1;animation:eidle 3s ease-in-out infinite;}
@keyframes eidle{0%,100%{transform:scale(1) translateY(0);}50%{transform:scale(1.06) translateY(-4px);}}
.card-disc-word{font-family:var(--fd);font-weight:700;
  font-size:clamp(.82rem,2.6vw,1rem);color:var(--ink);
  position:relative;z-index:1;}
.badge-letter{position:absolute;top:6px;left:8px;z-index:2;
  font-family:var(--fd);font-weight:700;
  font-size:clamp(.8rem,2.4vw,.95rem);color:var(--gold-d);
  background:rgba(255,255,255,.9);border-radius:8px;padding:1px 6px;
  box-shadow:0 2px 4px rgba(0,0,0,.12);}
.badge-star{position:absolute;top:6px;right:8px;z-index:2;
  font-size:clamp(.85rem,2.4vw,1.05rem);
  animation:sglow 2.2s ease-in-out infinite;}
@keyframes sglow{0%,100%{filter:drop-shadow(0 0 4px rgba(255,208,0,.6));}
  50%{filter:drop-shadow(0 0 10px rgba(255,208,0,1));}}

/* ── LEARNING MODAL ── */
.modal-ov{position:fixed;inset:0;z-index:800;
  background:rgba(27,19,64,.68);backdrop-filter:blur(7px);
  display:flex;align-items:center;justify-content:center;
  padding:14px;opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity .3s,visibility .3s;}
.modal-ov.open{opacity:1;visibility:visible;pointer-events:auto;}

.modal-card{
  background:var(--paper);border-radius:28px;
  max-width:450px;width:100%;
  max-height:92svh;overflow-y:auto;
  padding:clamp(16px,3.5vw,28px) clamp(14px,3.5vw,26px);
  box-shadow:0 12px 0 var(--paper-e),0 22px 60px rgba(0,0,0,.5);
  border:5px solid var(--gold);text-align:center;
  transform:scale(.75) translateY(32px);opacity:0;
  transition:transform .42s cubic-bezier(.34,1.56,.64,1),opacity .32s ease;
  position:relative;
}
.modal-ov.open .modal-card{transform:scale(1) translateY(0);opacity:1;}

/* scrollbar */
.modal-card::-webkit-scrollbar{width:5px;}
.modal-card::-webkit-scrollbar-thumb{background:var(--paper-e);border-radius:3px;}

/* bottom sheet on mobile */
@media(max-width:520px){
  .modal-ov{align-items:flex-end;padding:0;}
  .modal-card{max-width:100%;border-radius:24px 24px 0 0;max-height:96svh;}
}

/* modal header row */
.mhdr{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;gap:8px;}
.mbtn{background:none;border:2px solid var(--ink-xs);border-radius:11px;
  padding:6px 11px;color:var(--ink-s);font-weight:700;font-size:.88rem;
  transition:background .18s,color .18s,border-color .18s;}
.mbtn:hover,.mbtn:focus-visible{background:var(--ink);color:var(--white);
  border-color:var(--ink);}
.mbtn:disabled{opacity:.3;pointer-events:none;}
.mbtn:focus-visible{outline:none;}
.mlvl-badge{font-family:var(--fd);font-weight:700;font-size:.82rem;
  padding:5px 14px;border-radius:11px;color:var(--ink);}
.mnav-pair{display:flex;gap:5px;}

/* ── LETTER TRACE ── */
.trace-row{display:flex;align-items:center;justify-content:center;
  gap:clamp(12px,4vw,28px);margin-bottom:10px;}
.trace-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.tg{/* ghost */
  font-family:var(--fd);font-weight:700;
  font-size:clamp(4rem,14vw,5.8rem);
  color:rgba(43,27,78,.07);line-height:1;user-select:none;display:block;}
.tg.sm{font-size:clamp(2.6rem,9.5vw,4rem);}
.tf{/* fill — clips in left→right */
  font-family:var(--fd);font-weight:700;
  font-size:clamp(4rem,14vw,5.8rem);
  line-height:1;user-select:none;
  position:absolute;top:0;left:0;width:100%;
  clip-path:inset(0 100% 0 0);
  animation:write 1.1s cubic-bezier(.35,0,.2,1) .15s forwards;
}
.tf.sm{font-size:clamp(2.6rem,9.5vw,4rem);animation-delay:.95s;}
@keyframes write{to{clip-path:inset(0 0% 0 0);}}

/* trace label */
.trace-label{font-size:clamp(.7rem,2vw,.82rem);color:var(--ink-s);
  font-weight:600;margin-bottom:6px;}

/* ── EMOJI STAGE ── */
.emoji-stage{display:flex;flex-direction:column;align-items:center;
  gap:4px;margin:2px 0 14px;cursor:pointer;position:relative;user-select:none;}
.big-emoji{font-size:clamp(5rem,20vw,7rem);line-height:1;display:block;
  animation:eenter .55s cubic-bezier(.34,1.56,.64,1) .45s both;}
@keyframes eenter{0%{transform:scale(0) rotate(-12deg);opacity:0;}
  100%{transform:scale(1) rotate(0);opacity:1;}}
.emoji-hint{font-size:clamp(.68rem,1.9vw,.8rem);color:var(--ink-s);font-weight:600;}
.speak-bubble{position:absolute;top:-10px;left:50%;
  transform:translateX(-50%) scale(0) translateY(-50%);
  background:var(--white);border:3px solid var(--ink);border-radius:14px;
  padding:6px 16px;font-family:var(--fd);font-weight:700;
  font-size:clamp(1rem,3.5vw,1.25rem);color:var(--ink);
  white-space:nowrap;pointer-events:none;z-index:5;
  animation:speak .38s cubic-bezier(.34,1.56,.64,1) forwards;}
.speak-bubble::after{content:'';position:absolute;bottom:-13px;left:50%;
  transform:translateX(-50%);border:10px solid transparent;
  border-top-color:var(--ink);}
.speak-bubble::before{content:'';position:absolute;bottom:-9px;left:50%;
  transform:translateX(-50%);border:10px solid transparent;
  border-top-color:var(--white);z-index:1;}
@keyframes speak{0%{transform:translateX(-50%) scale(0) translateY(0);}
  100%{transform:translateX(-50%) scale(1) translateY(0);}}
.speak-bubble.bye{animation:speakbye .28s ease forwards;}
@keyframes speakbye{to{transform:translateX(-50%) scale(0) translateY(-8px);opacity:0;}}

/* emoji tap anims */
.ea-bounce{animation:ea-b .52s ease!important;}
.ea-spin{animation:ea-s .52s ease!important;}
.ea-wiggle{animation:ea-w .48s ease!important;}
.ea-pop{animation:ea-p .42s ease!important;}
.ea-flip{animation:ea-f .48s ease!important;}
.ea-shake{animation:ea-k .44s ease!important;}
@keyframes ea-b{0%,100%{transform:scale(1)translateY(0);}40%{transform:scale(1.12)translateY(-44px);}70%{transform:scale(.94)translateY(-14px);}}
@keyframes ea-s{0%{transform:rotate(0)scale(1);}50%{transform:rotate(180deg)scale(1.22);}100%{transform:rotate(360deg)scale(1);}}
@keyframes ea-w{0%,100%{transform:rotate(0);}18%{transform:rotate(-17deg);}36%{transform:rotate(17deg);}54%{transform:rotate(-11deg);}72%{transform:rotate(11deg);}}
@keyframes ea-p{0%,100%{transform:scale(1);}50%{transform:scale(1.48);}}
@keyframes ea-f{0%{transform:scaleX(1);}50%{transform:scaleX(-1.18);}100%{transform:scaleX(1);}}
@keyframes ea-k{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-11px);}40%,80%{transform:translateX(11px);}}

/* ── WORD CASCADE ── */
.wcascade{display:flex;align-items:baseline;justify-content:center;
  flex-wrap:wrap;gap:1px;margin-bottom:12px;}
.wl{font-family:var(--fd);font-weight:700;
  font-size:clamp(1.7rem,6.5vw,2.5rem);color:var(--ink);
  opacity:0;transform:translateY(14px) scale(.55);
  animation:wlpop .32s ease forwards;display:inline-block;line-height:1;}
.wl.first{font-size:clamp(2.1rem,8vw,3rem);}
@keyframes wlpop{to{opacity:1;transform:translateY(0) scale(1);}}

/* ── TRANSLATION ROW ── */
.trans-row{display:flex;align-items:center;justify-content:center;
  gap:9px;margin-bottom:11px;
  opacity:0;transform:translateX(-18px);
  animation:tslidein .45s ease forwards;}
@keyframes tslidein{to{opacity:1;transform:translateX(0);}}
.trans-flag{font-size:1.35rem;}
.trans-word{font-family:var(--fd);font-weight:700;
  font-size:clamp(1.3rem,4.8vw,1.85rem);color:var(--ink);}

/* ── PHONETIC ── */
.ph-label{font-size:clamp(.68rem,1.9vw,.8rem);color:var(--ink-s);
  font-weight:600;margin-bottom:7px;
  opacity:0;animation:tslidein .4s ease forwards;}
.ph-bubbles{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;
  margin-bottom:4px;}
.ph-bub{font-family:var(--fd);font-weight:700;
  font-size:clamp(1.1rem,4vw,1.5rem);
  padding:6px 16px;border-radius:40px;color:var(--ink);
  opacity:0;transform:scale(0);
  animation:bubpop .38s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes bubpop{to{opacity:1;transform:scale(1);}}

/* modal footer */
.mfooter{display:flex;align-items:center;justify-content:space-between;
  margin-top:16px;padding-top:13px;
  border-top:2px dashed rgba(43,27,78,.11);}
.minfo{font-size:.8rem;color:var(--ink-s);font-weight:600;}
.done-btn{font-family:var(--fb);font-weight:800;
  font-size:clamp(.92rem,2.8vw,1.08rem);border:none;border-radius:15px;
  padding:12px 26px;color:var(--ink);background:var(--gold);
  box-shadow:0 5px 0 var(--gold-d),0 9px 18px rgba(0,0,0,.2);
  transition:transform .14s,box-shadow .14s;}
.done-btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--gold-d);}
.done-btn:focus-visible{outline:3px solid var(--ink);outline-offset:3px;}

/* ── PARTICLES ── */
.spark-layer{position:fixed;inset:0;z-index:500;pointer-events:none;overflow:hidden;}
.sp{position:absolute;border-radius:50%;
  animation:spfly .68s ease-out forwards;}
@keyframes spfly{to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}}

/* ── CONFETTI ── */
.confetti-piece{position:absolute;top:-12%;
  animation:cfall linear forwards;}
@keyframes cfall{to{transform:translateY(130vh) rotate(560deg);}}

/* ── OVERLAYS ── */
.ov{position:fixed;inset:0;z-index:900;
  display:flex;align-items:center;justify-content:center;padding:18px;
  background:rgba(27,19,64,.62);backdrop-filter:blur(5px);
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity .32s,visibility .32s;}
.ov.vis{opacity:1;visibility:visible;pointer-events:auto;}
.ov-card{position:relative;background:var(--paper);border-radius:28px;
  padding:clamp(22px,4.5vw,42px) clamp(18px,4.5vw,38px);
  max-width:480px;width:100%;text-align:center;
  box-shadow:0 10px 0 var(--paper-e),0 22px 50px rgba(0,0,0,.44);
  transform:scale(.68) translateY(38px);opacity:0;
  transition:transform .48s cubic-bezier(.34,1.56,.64,1),opacity .38s;}
.ov.vis .ov-card{transform:scale(1) translateY(0);opacity:1;}
.ov-cconf{position:absolute;inset:0;overflow:hidden;border-radius:inherit;pointer-events:none;}
.ov-emoji{font-size:clamp(1.9rem,6.5vw,2.7rem);margin-bottom:7px;
  animation:ea-b 2.5s ease-in-out infinite;}
.ov-card h2{font-family:var(--fd);font-size:clamp(1.15rem,4vw,1.7rem);
  color:var(--ink);margin:0 0 20px;line-height:1.42;}
.cbtn{display:inline-block;font-family:var(--fb);font-weight:800;
  font-size:clamp(.92rem,2.8vw,1.1rem);border:none;border-radius:16px;
  padding:13px 28px;color:var(--ink);background:var(--gold);
  box-shadow:0 6px 0 var(--gold-d),0 10px 20px rgba(0,0,0,.2);
  transition:transform .14s,box-shadow .14s;touch-action:manipulation;}
.cbtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--gold-d);}
.cbtn:focus-visible{outline:3px solid var(--ink);outline-offset:3px;}

/* finale */
.trophy{font-size:clamp(3.4rem,12vw,5.5rem);
  animation:ea-p 2.4s ease-in-out infinite;margin-bottom:5px;}
.gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;
  margin:14px 0 18px;max-height:210px;overflow-y:auto;padding:2px;}
.gallery::-webkit-scrollbar{width:5px;}
.gallery::-webkit-scrollbar-thumb{background:var(--paper-e);border-radius:3px;}
.gs{display:flex;flex-direction:column;align-items:center;gap:1px;
  background:rgba(255,255,255,.75);border-radius:12px;padding:7px 8px;
  font-size:.72rem;color:var(--ink-s);font-weight:600;
  animation:bubpop .4s ease both;}
.gs-emoji{font-size:1.75rem;line-height:1;}
.gs-letter{font-family:var(--fd);font-weight:700;color:var(--ink);font-size:.9rem;}
.fin-replay{background:var(--l1);box-shadow:0 6px 0 var(--l1d),0 10px 20px rgba(0,0,0,.2);}
.fin-replay:active{box-shadow:0 1px 0 var(--l1d);}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;
    animation-iteration-count:1!important;transition-duration:.001ms!important;}
}
</style>
</head>
<body>

<!-- Cosmic BG -->
<div class="cosmic" aria-hidden="true">
  <div class="blob" data-l="1"></div>
  <div class="blob" data-l="2"></div>
  <div class="blob" data-l="3"></div>
  <div class="blob" data-l="4"></div>
  <div class="stars" id="stars"></div>
</div>

<div class="shell">
  <header class="hdr">
    <div class="hdr-title-row">
      <span class="wand" aria-hidden="true">🪄</span>
      <h1 class="hdr-title">Магічна Абетка від А до Я! <span aria-hidden="true">🌟</span></h1>
    </div>
    <div class="hdr-bubble">Натисни на літеру, щоб відкрити її магію!</div>
    <div class="overall" aria-live="polite">
      <span aria-hidden="true">⭐</span>
      <span id="cntEl">0</span><span>/26 літер відкрито</span>
    </div>
  </header>
  <nav class="tabs" id="tabsEl" aria-label="Вибір рівня"></nav>
  <div class="stage" id="stageEl" data-l="1">
    <div class="pstars" id="pstarsEl" aria-hidden="true"></div>
    <main class="grid" id="gridEl"></main>
  </div>
</div>

<!-- Learning Modal -->
<div class="modal-ov" id="modalOv" role="dialog" aria-modal="true" aria-labelledby="mlabel">
  <div class="modal-card" id="modalCard">
    <div class="mhdr">
      <button class="mbtn" id="mClose" type="button">✕ Закрити</button>
      <div class="mlvl-badge" id="mBadge">Рівень 1</div>
      <div class="mnav-pair">
        <button class="mbtn" id="mPrev" type="button" aria-label="Попередня літера">◀</button>
        <button class="mbtn" id="mNext" type="button" aria-label="Наступна літера">▶</button>
      </div>
    </div>
    <!-- dynamic content rebuilt per letter -->
    <div id="mInner"></div>
    <div class="mfooter">
      <span class="minfo" id="mInfo"></span>
      <button class="done-btn" id="mDone" type="button">Супер! ⭐</button>
    </div>
  </div>
</div>

<div class="spark-layer" id="sparkLayer" aria-hidden="true"></div>

<!-- Level complete -->
<div class="ov" id="lvlOv" role="dialog" aria-modal="true" aria-labelledby="lvlTitle">
  <div class="ov-card">
    <div class="ov-cconf" id="lvlConf"></div>
    <div class="ov-emoji">🌟🚀🌟</div>
    <h2 id="lvlTitle">Чудова робота!<br>Переходь до наступного рівня! 🚀</h2>
    <button type="button" class="cbtn" id="lvlNext">Далі! 🚀</button>
  </div>
</div>

<!-- Grand finale -->
<div class="ov" id="finOv" role="dialog" aria-modal="true">
  <div class="ov-card" style="max-width:530px">
    <div class="ov-cconf" id="finConf"></div>
    <div class="trophy">🏆</div>
    <h2>Ти підкорив усю абетку!<br>Ти справжній супергерой! 🏆🎉</h2>
    <div class="gallery" id="gallery"></div>
    <button type="button" class="cbtn fin-replay" id="replayBtn">Грати знову! 🔄</button>
  </div>
</div>

<script>
(function(){
"use strict";

/* ═══════════════════════ DATA ═══════════════════════ */
const ABC = [
  {L:"A",l:"a",word:"Apple",     em:"🍎",uk:"Яблуко",     sy:["Е","пл"],          lv:1},
  {L:"B",l:"b",word:"Ball",      em:"⚽",uk:"М'яч",       sy:["Бол"],             lv:1},
  {L:"C",l:"c",word:"Cat",       em:"🐱",uk:"Кіт",        sy:["Кет"],             lv:1},
  {L:"D",l:"d",word:"Dog",       em:"🐶",uk:"Собака",     sy:["Доґ"],             lv:1},
  {L:"E",l:"e",word:"Elephant",  em:"🐘",uk:"Слон",       sy:["Е","ле","фант"],   lv:1},
  {L:"F",l:"f",word:"Fish",      em:"🐟",uk:"Риба",       sy:["Фіш"],             lv:1},
  {L:"G",l:"g",word:"Gorilla",   em:"🦍",uk:"Горила",     sy:["Ґо","рі","ла"],    lv:1},
  {L:"H",l:"h",word:"Hat",       em:"🎩",uk:"Капелюх",    sy:["Хет"],             lv:2},
  {L:"I",l:"i",word:"Iguana",    em:"🦎",uk:"Ігуана",     sy:["І","ґу","а","на"], lv:2},
  {L:"J",l:"j",word:"Juice",     em:"🧃",uk:"Сік",        sy:["Джус"],            lv:2},
  {L:"K",l:"k",word:"Kangaroo",  em:"🦘",uk:"Кенгуру",    sy:["Кен","ґа","ру"],   lv:2},
  {L:"L",l:"l",word:"Lion",      em:"🦁",uk:"Лев",        sy:["Ла","єн"],         lv:2},
  {L:"M",l:"m",word:"Monkey",    em:"🐵",uk:"Мавпа",      sy:["Ман","кі"],        lv:2},
  {L:"N",l:"n",word:"Nest",      em:"🪹",uk:"Гніздо",     sy:["Нест"],            lv:2},
  {L:"O",l:"o",word:"Octopus",   em:"🐙",uk:"Восьминіг",  sy:["Ок","то","пус"],   lv:3},
  {L:"P",l:"p",word:"Penguin",   em:"🐧",uk:"Пінгвін",    sy:["Пен","ґу","ін"],   lv:3},
  {L:"Q",l:"q",word:"Queen",     em:"👑",uk:"Королева",   sy:["Квін"],            lv:3},
  {L:"R",l:"r",word:"Rabbit",    em:"🐰",uk:"Кролик",     sy:["Ре","біт"],        lv:3},
  {L:"S",l:"s",word:"Sun",       em:"☀️",uk:"Сонце",      sy:["Сан"],             lv:3},
  {L:"T",l:"t",word:"Tiger",     em:"🐯",uk:"Тигр",       sy:["Тай","ґер"],       lv:3},
  {L:"U",l:"u",word:"Umbrella",  em:"☂️",uk:"Парасолька", sy:["Ам","бре","ла"],   lv:4},
  {L:"V",l:"v",word:"Van",       em:"🚐",uk:"Фургон",     sy:["Вен"],             lv:4},
  {L:"W",l:"w",word:"Water",     em:"💧",uk:"Вода",       sy:["Во","тер"],        lv:4},
  {L:"X",l:"x",word:"Xylophone", em:"🪘",uk:"Ксилофон",   sy:["Зай","ло","фон"],  lv:4},
  {L:"Y",l:"y",word:"Yo-yo",     em:"🪀",uk:"Йо-йо",      sy:["Йо","йо"],         lv:4},
  {L:"Z",l:"z",word:"Zebra",     em:"🦓",uk:"Зебра",      sy:["Зеб","ра"],        lv:4}
];
const LVLS = [
  {id:1,ico:"🌸",range:"A–G"},
  {id:2,ico:"🍊",range:"H–N"},
  {id:3,ico:"💧",range:"O–T"},
  {id:4,ico:"🌿",range:"U–Z"}
];
const ACCENT = {1:"#FF7FA8",2:"#FF9F45",3:"#3DC8F5",4:"#5EE09A"};
const ACCENT_D = {1:"#D93F72",2:"#D97020",3:"#0A9FD4",4:"#1BB870"};
const CONFETTI_COLS = ["#FF7FA8","#FF9F45","#3DC8F5","#5EE09A","#FFD23F","#fff","#A29BFE","#FF6B6B"];
const EA = ["ea-bounce","ea-spin","ea-wiggle","ea-pop","ea-flip","ea-shake"];

/* ═══════════════════════ STATE ═══════════════════════ */
let curLv = 1;
const disc = new Set();
const doneL = new Set();
let grandShown = false;
let mItems = [];
let mIdx = 0;
let mOpen = false;
let eTapping = false;
let speakTimer = null;

/* ═══════════════════════ REFS ═══════════════════════ */
const $=id=>document.getElementById(id);
const starsEl=$("stars"),tabsEl=$("tabsEl"),stageEl=$("stageEl");
const pstarsEl=$("pstarsEl"),gridEl=$("gridEl"),cntEl=$("cntEl");
const modalOv=$("modalOv"),mInner=$("mInner"),mBadge=$("mBadge");
const mPrev=$("mPrev"),mNext=$("mNext"),mInfo=$("mInfo"),sparkLayer=$("sparkLayer");
const lvlOv=$("lvlOv"),finOv=$("finOv"),gallery=$("gallery");

/* ═══════════════════════ INIT ═══════════════════════ */
function init(){
  buildStars();
  renderTabs();renderPStars();renderCards();blobSync();
  $("mClose").addEventListener("click",closeModal);
  $("mDone").addEventListener("click",closeModal);
  mPrev.addEventListener("click",()=>navModal(-1));
  mNext.addEventListener("click",()=>navModal(1));
  mInner.addEventListener("click",e=>{
    if(e.target.closest(".emoji-stage")) tapEmoji();
  });
  mInner.addEventListener("keydown",e=>{
    const es=e.target.closest(".emoji-stage");
    if(es&&(e.key==="Enter"||e.key===" ")) tapEmoji();
  });
  modalOv.addEventListener("click",e=>{if(e.target===modalOv)closeModal();});
  $("lvlNext").addEventListener("click",hideLvlDone);
  $("replayBtn").addEventListener("click",resetGame);
  lvlOv.addEventListener("click",e=>{if(e.target===lvlOv)hideLvlDone();});
  finOv.addEventListener("click",e=>{if(e.target===finOv)finOv.classList.remove("vis");});
  document.addEventListener("keydown",e=>{
    if(!mOpen)return;
    if(e.key==="ArrowLeft")navModal(-1);
    if(e.key==="ArrowRight")navModal(1);
    if(e.key==="Escape")closeModal();
  });
}

/* ═══════════════════════ STARS BG ═══════════════════════ */
function buildStars(){
  const f=document.createDocumentFragment();
  for(let i=0;i<60;i++){
    const s=document.createElement("span");
    s.className="star";
    const sz=.9+Math.random()*2.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2.6+Math.random()*3.4}s;animation-delay:${Math.random()*5}s`;
    f.appendChild(s);
  }
  starsEl.appendChild(f);
}
function blobSync(){
  document.querySelectorAll(".blob").forEach(b=>{
    b.classList.toggle("lit",+b.dataset.l===curLv);
  });
}

/* ═══════════════════════ RENDER ═══════════════════════ */
function renderTabs(){
  tabsEl.innerHTML="";
  const f=document.createDocumentFragment();
  LVLS.forEach(lv=>{
    const items=ABC.filter(a=>a.lv===lv.id);
    const done=items.filter(a=>disc.has(a.L)).length;
    const complete=done===items.length;
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="tab"+(lv.id===curLv?" on":"")+(complete?" done":"");
    btn.dataset.l=lv.id;
    btn.setAttribute("aria-label",`Рівень ${lv.id}, Літери ${lv.range}, відкрито ${done} з ${items.length}`);
    btn.innerHTML=`<span class="tab-ico">${lv.ico}</span><span class="tab-name">Рівень ${lv.id}</span><span class="tab-range">Літери ${lv.range}</span><span class="tab-status">${complete?"✅ Готово":`${done}/${items.length} ⭐`}</span>`;
    btn.addEventListener("click",()=>switchLv(lv.id));
    f.appendChild(btn);
  });
  tabsEl.appendChild(f);
}

function renderPStars(){
  pstarsEl.innerHTML="";
  const f=document.createDocumentFragment();
  ABC.filter(a=>a.lv===curLv).forEach(a=>{
    const s=document.createElement("span");
    s.className="pstar"+(disc.has(a.L)?" lit":"");
    s.textContent=disc.has(a.L)?"★":"☆";
    s.dataset.lt=a.L;
    f.appendChild(s);
  });
  pstarsEl.appendChild(f);
}

function renderCards(){
  gridEl.innerHTML="";
  const f=document.createDocumentFragment();
  ABC.filter(a=>a.lv===curLv).forEach(item=>{
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="card";
    btn.dataset.l=item.lv;
    btn.dataset.lt=item.L;
    btn.setAttribute("aria-label",disc.has(item.L)?`${item.L} - ${item.word} - ${item.uk}`:`Літера ${item.L}. Натисни щоб відкрити!`);
    btn.innerHTML=cardHTML(item);
    btn.addEventListener("click",()=>openModal(item.L));
    f.appendChild(btn);
  });
  gridEl.appendChild(f);
}

function cardHTML(item){
  const d=disc.has(item.L);
  if(d) return `<div class="card-body disc">
      <span class="badge-letter">${item.L}${item.l}</span>
      <span class="badge-star" aria-hidden="true">⭐</span>
      <span class="card-disc-emoji" aria-hidden="true">${item.em}</span>
      <span class="card-disc-word" lang="en">${item.word}</span>
    </div>`;
  return `<div class="card-body">
      <span class="card-ring" aria-hidden="true"></span>
      <span class="card-big" lang="en">${item.L}</span>
      <span class="card-sm" lang="en">${item.l}</span>
      <span class="card-hint">👆 Тисни!</span>
    </div>`;
}

function switchLv(id){
  curLv=id;
  stageEl.dataset.l=id;
  renderTabs();renderPStars();renderCards();blobSync();
}

/* ═══════════════════════ MODAL ═══════════════════════ */
function openModal(letter){
  mItems=ABC.filter(a=>a.lv===curLv);
  mIdx=mItems.findIndex(a=>a.L===letter);
  if(mIdx<0)mIdx=0;
  mOpen=true;
  fillModal();
  modalOv.classList.add("open");
  setTimeout(()=>$("mClose").focus(),440);
}

function closeModal(){
  mOpen=false;
  modalOv.classList.remove("open");
  clearTimeout(speakTimer);
}

function navModal(dir){
  const nx=mIdx+dir;
  if(nx<0||nx>=mItems.length)return;
  mIdx=nx;
  fillModal();
}

function fillModal(){
  const item=mItems[mIdx];
  if(!item)return;
  const ac=ACCENT[item.lv];
  const acd=ACCENT_D[item.lv];

  // Static updates
  mBadge.textContent="Рівень "+item.lv;
  mBadge.style.background=ac;
  $("modalCard").style.borderColor=ac;
  mPrev.disabled=mIdx===0;
  mNext.disabled=mIdx===mItems.length-1;
  mInfo.textContent=`${mIdx+1} / ${mItems.length}`;

  // Build inner HTML (rebuilding restarts all CSS animations automatically)
  const bubColors=["#FFD23F",ac,"#FF7FA8","#5BC8F2"];
  const bubHtml=item.sy.map((s,i)=>`<span class="ph-bub" style="background:${bubColors[i%4]};animation-delay:${1150+i*200}ms">${s}</span>`).join("");
  const wLetters=item.word.split("").map((ch,i)=>`<span class="wl${i===0?" first":""}" style="animation-delay:${580+i*105}ms;${i===0?"color:"+ac:""}" lang="en">${ch}</span>`).join("");

  mInner.innerHTML=`
    <p class="trace-label">✏️ Дивись, як пишеться ця літера!</p>
    <div class="trace-row">
      <div class="trace-wrap">
        <span class="tg" aria-hidden="true">${item.L}</span>
        <span class="tf" aria-hidden="true" style="color:${ac}">${item.L}</span>
      </div>
      <div class="trace-wrap">
        <span class="tg sm" aria-hidden="true">${item.l}</span>
        <span class="tf sm" aria-hidden="true" style="color:${acd}">${item.l}</span>
      </div>
    </div>

    <div class="emoji-stage" id="emojiStage" role="button" tabindex="0"
         aria-label="Натисни, щоб анімувати ${item.em}">
      <span class="big-emoji" id="bigEmoji">${item.em}</span>
      <span class="emoji-hint">👆 Натисни на мене!</span>
    </div>

    <div class="wcascade" id="wcEl">${wLetters}</div>

    <div class="trans-row" style="animation-delay:870ms">
      <span class="trans-flag" aria-hidden="true">🇺🇦</span>
      <span class="trans-word">${item.uk}</span>
    </div>

    <p class="ph-label" style="animation-delay:1020ms">👄 Вимова по-українськи:</p>
    <div class="ph-bubbles">${bubHtml}</div>
  `;

  // Handle discovery
  if(!disc.has(item.L)) handleDisc(item);
  else reRenderCard(item.L);
}

/* ═══════════════════════ EMOJI TAP ═══════════════════════ */
function tapEmoji(){
  if(eTapping)return;
  eTapping=true;
  const el=document.getElementById("bigEmoji");
  const stage=document.getElementById("emojiStage");
  if(!el||!stage)return;

  // Remove all anim classes then add one random
  EA.forEach(c=>el.classList.remove(c));
  void el.offsetWidth;
  el.classList.add(EA[Math.floor(Math.random()*EA.length)]);

  // Speech bubble with word
  const existing=stage.querySelector(".speak-bubble");
  if(existing){existing.remove(); clearTimeout(speakTimer);}
  const item=mItems[mIdx];
  if(item){
    const bub=document.createElement("span");
    bub.className="speak-bubble";
    bub.textContent=item.word;
    bub.setAttribute("aria-hidden","true");
    stage.appendChild(bub);
    speakTimer=setTimeout(()=>{
      bub.classList.add("bye");
      setTimeout(()=>bub.remove(),300);
    },1400);
  }

  spawnParticles(
    stage.getBoundingClientRect().left+stage.offsetWidth/2,
    stage.getBoundingClientRect().top+stage.offsetHeight/2, 10
  );
  setTimeout(()=>{EA.forEach(c=>el&&el.classList.remove(c));eTapping=false;},600);
}

/* ═══════════════════════ DISCOVERY ═══════════════════════ */
function handleDisc(item){
  disc.add(item.L);
  reRenderCard(item.L);
  popStar(item.L);
  updateCount();
  renderTabs();
  addFloatEmoji(item.em);
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  spawnParticles(cx,cy,16);

  const lvItems=ABC.filter(a=>a.lv===curLv).map(a=>a.L);
  const lvDone=lvItems.every(L=>disc.has(L));
  if(lvDone&&!doneL.has(curLv)){
    doneL.add(curLv);
    if(disc.size===26&&!grandShown){
      grandShown=true;
      setTimeout(showGrandFinale,1200);
    } else {
      setTimeout(()=>{ if(!grandShown) showLvlDone(); },1100);
    }
  }
}

function reRenderCard(letter){
  const btn=gridEl.querySelector(`[data-lt="${letter}"]`);
  if(!btn)return;
  const item=ABC.find(a=>a.L===letter);
  if(!item)return;
  btn.innerHTML=cardHTML(item);
  btn.setAttribute("aria-label",`${item.L} - ${item.word} - ${item.uk}`);
}

function popStar(letter){
  const s=pstarsEl.querySelector(`[data-lt="${letter}"]`);
  if(!s)return;
  s.textContent="★";s.classList.add("lit","pop");
  setTimeout(()=>s.classList.remove("pop"),520);
}

function updateCount(){cntEl.textContent=disc.size;}

/* ═══════════════════════ FLOAT EMOJIS ═══════════════════════ */
function addFloatEmoji(em){
  const el=document.createElement("span");
  el.className="float-emoji";
  el.textContent=em;
  el.setAttribute("aria-hidden","true");
  const dur=20+Math.random()*16;
  el.style.cssText=`left:${8+Math.random()*84}%;font-size:${1.3+Math.random()*.9}rem;animation-duration:${dur}s;animation-delay:${Math.random()*3}s;`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),(dur+4)*1000);
}

/* ═══════════════════════ PARTICLES ═══════════════════════ */
function spawnParticles(x,y,n){
  for(let i=0;i<n;i++){
    const p=document.createElement("span");
    p.className="sp";
    const angle=(Math.PI*2*i/n)+(Math.random()*.7-.35);
    const dist=40+Math.random()*58;
    const sz=5+Math.random()*9;
    const col=Math.random()>.42?"#FFD23F":"#fff";
    p.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${col};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;animation-duration:${.5+Math.random()*.32}s`;
    sparkLayer.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}

/* ═══════════════════════ CONFETTI ═══════════════════════ */
function makeConfetti(container,n){
  container.innerHTML="";
  const f=document.createDocumentFragment();
  for(let i=0;i<n;i++){
    const p=document.createElement("span");
    p.className="confetti-piece";
    p.style.left=Math.random()*100+"%";
    p.style.background=CONFETTI_COLS[Math.floor(Math.random()*CONFETTI_COLS.length)];
    p.style.animationDuration=(2.2+Math.random()*2)+"s";
    p.style.animationDelay=Math.random()*.7+"s";
    p.style.width=(5+Math.random()*7)+"px";
    p.style.height=(9+Math.random()*9)+"px";
    p.style.borderRadius=Math.random()>.5?"50%":"3px";
    f.appendChild(p);
  }
  container.appendChild(f);
}

/* ═══════════════════════ CELEBRATIONS ═══════════════════════ */
function showLvlDone(){
  closeModal();
  makeConfetti($("lvlConf"),60);
  lvlOv.classList.add("vis");
  setTimeout(()=>$("lvlNext").focus(),480);
}
function hideLvlDone(){
  lvlOv.classList.remove("vis");
  const next=LVLS.find(l=>!doneL.has(l.id));
  if(next)switchLv(next.id);
}

function showGrandFinale(){
  closeModal();
  makeConfetti($("finConf"),130);
  gallery.innerHTML="";
  const f=document.createDocumentFragment();
  ABC.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="gs";
    div.style.animationDelay=i*35+"ms";
    div.innerHTML=`<span class="gs-emoji">${item.em}</span><span class="gs-letter">${item.L}</span><span>${item.word}</span>`;
    f.appendChild(div);
  });
  gallery.appendChild(f);
  finOv.classList.add("vis");
  setTimeout(()=>$("replayBtn").focus(),480);
}

/* ═══════════════════════ RESET ═══════════════════════ */
function resetGame(){
  disc.clear();doneL.clear();grandShown=false;
  document.querySelectorAll(".float-emoji").forEach(e=>e.remove());
  finOv.classList.remove("vis");
  lvlOv.classList.remove("vis");
  updateCount();
  switchLv(1);
}

init();
})();
</script>
</body>
</html>
